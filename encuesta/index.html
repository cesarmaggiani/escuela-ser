<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Satisfacción SER 2026</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --ser-magenta: #E11B7E; --ser-yellow: #FCCC32; --ser-cyan: #009BD1; --ser-gray: #f4f6f8; }
        body { background-color: var(--ser-gray); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const SITE_CONFIG = {
            links: {
                "COACHING": "https://forms.gle/iURsyY9uu8SoS2hc9",
                "TABLEROS": "https://forms.gle/wH3kJHQg72TYKRji6",
                "ACOMPAÑAMIENTO": "https://forms.gle/iXewEuWfksVYqGhU8",
                "COMUNIDADES": "https://forms.gle/T1AegzzxbjF8ppTN8",
                "CÁLCULO MENTAL": "https://forms.gle/jmiVfq1UL3S7vhpF9",
                "MATEMÁTICAS": "https://forms.gle/iYv5n3rt6ZUSnu2fA",
                "ESPAÑOL": "https://forms.gle/43zyFG6Rq5zLKw4Z7",
                "ESTUDIO DE PALABRAS": "https://forms.gle/1ZDthTdvCNsG3o7R9",
                "CIENCIA Y TECNOLOGÍA": "https://forms.gle/tfz5PcKZwzTsYWuN7",
                "DBQ": "https://forms.gle/gUpY4n8aGzgA3VPYA",
                "INGLÉS": "https://forms.gle/jtCvWkgMdhsxRHhU6",
                "PENSAMIENTO LECTOR": "https://forms.gle/CJsk4hy6Y6zH5qtV7"
            }
        };

        const App = () => {
            return (
                <div className="p-10 text-center">
                    <h1 className="text-4xl font-bold mb-6">Encuestas SER 2026</h1>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        {Object.keys(SITE_CONFIG.links).map(key => (
                            <a key={key} href={SITE_CONFIG.links[key]} target="_blank" className="p-4 bg-white shadow rounded hover:bg-pink-100 transition">
                                {key}
                            </a>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
