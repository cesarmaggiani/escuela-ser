<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta SER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cabin&family=Bebas+Neue&display=swap');
        body { font-family: 'Cabin', sans-serif; background-color: #f4f6f8; }
        .brand-font { font-family: 'Bebas Neue', sans-serif; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto space-y-8">
        <h1 class="text-4xl text-center brand-font text-gray-800">Encuesta de Satisfacción SER 2026</h1>
        
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        const datos = [
            { titulo: "COACHING", url: "https://forms.gle/iURsyY9uu8SoS2hc9", color: "border-blue-500" },
            { titulo: "TABLEROS", url: "https://forms.gle/wH3kJHQg72TYKRji6", color: "border-blue-500" },
            { titulo: "MATEMÁTICAS", url: "https://forms.gle/iYv5n3rt6ZUSnu2fA", color: "border-pink-500" },
            { titulo: "ESPAÑOL", url: "https://forms.gle/43zyFG6Rq5zLKw4Z7", color: "border-pink-500" }
            // Agrega aquí todos tus enlaces siguiendo este formato
        ];

        const grid = document.getElementById('grid');
        
        datos.forEach(item => {
            const card = document.createElement('a');
            card.href = item.url;
            card.target = "_blank";
            card.className = `block p-6 bg-white rounded-xl border-t-4 ${item.color} shadow-sm card-hover transition-all text-center`;
            card.innerHTML = `
                <h3 class="text-xl brand-font">${item.titulo}</h3>
                <p class="text-sm text-gray-500 mt-2">Clic para responder</p>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
