<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinámica: Reflexiones sobre la Ansiedad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos personalizados para la animación de giro 3D */
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        /* Cuando la tarjeta tiene la clase 'flipped', gira 180 grados */
        .flipped .card-inner {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800 flex flex-col">

    <!-- Encabezado -->
    <header class="text-center py-10 px-4">
        <h1 class="text-4xl md:text-5xl font-bold text-slate-700 mb-3 tracking-tight">Hablemos de Ansiedad</h1>
        <p class="text-lg text-slate-500 max-w-2xl mx-auto">Selecciona un número para descubrir la pregunta de reflexión. No hay respuestas correctas ni incorrectas.</p>
        <button id="reset-btn" class="mt-6 px-6 py-2 bg-indigo-100 text-indigo-700 rounded-full font-medium hover:bg-indigo-200 transition-colors shadow-sm text-sm">
            Ocultar todas las preguntas
        </button>
    </header>

    <!-- Contenedor de la cuadrícula -->
    <main class="flex-grow flex items-center justify-center p-4 pb-12">
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-5xl w-full">
            <!-- Las tarjetas se generarán aquí con JavaScript -->
        </div>
    </main>

    <script>
        // Array con las 9 preguntas seleccionadas
        const preguntas = [
            "Si la ansiedad fuera tu compañero de cuarto en la universidad, ¿cómo se comportaría?",
            "Del 1 al 10, ¿qué tan 'normal' hemos vuelto vivir estresados o romantizar el cansancio?",
            "¿Cuál es esa pequeña cosa (un correo, una mirada) que a veces te detona nervios desproporcionados?",
            "¿Dónde crees que termina la motivación por ser mejores y empieza la ansiedad por no ser suficientes?",
            "¿Qué tanto de la ansiedad que sentimos es 'nuestra' y cuánta es heredada por expectativas externas?",
            "Si mañana desaparecieran las redes sociales, ¿tu ansiedad subiría o bajaría?",
            "¿En qué parte de tu cuerpo sientes el primer 'aviso' físico de que la ansiedad está subiendo?",
            "¿Cómo suele ser tu diálogo interno cuando estás ansioso? ¿Es una voz que ayuda o que juzga?",
            "¿Cuál es el 'Y si...' (miedo al futuro) que más te roba energía en esta etapa de tu vida?"
        ];

        const gridContainer = document.getElementById('grid');
        const resetBtn = document.getElementById('reset-btn');

        // Función para crear las tarjetas
        function crearTarjetas() {
            preguntas.forEach((pregunta, index) => {
                const numero = index + 1;

                // Crear el contenedor de la tarjeta
                const card = document.createElement('div');
                card.className = 'card cursor-pointer perspective-1000 h-64 md:h-72 w-full group';
                card.dataset.index = index;

                // Estructura interna para el efecto 3D
                card.innerHTML = `
                    <div class="card-inner w-full h-full relative transform-style-3d shadow-lg rounded-2xl">
                        <!-- Lado Frontal (Número) -->
                        <div class="absolute inset-0 backface-hidden bg-white border-2 border-indigo-50 rounded-2xl flex items-center justify-center group-hover:border-indigo-200 group-hover:shadow-xl transition-all">
                            <span class="text-7xl font-bold text-indigo-300 group-hover:text-indigo-400 transition-colors">${numero}</span>
                        </div>
                        
                        <!-- Lado Trasero (Pregunta) -->
                        <div class="absolute inset-0 backface-hidden rotate-y-180 bg-indigo-600 text-white rounded-2xl flex flex-col items-center justify-center p-6 text-center shadow-xl">
                            <span class="text-indigo-200 text-sm font-semibold mb-3 tracking-widest uppercase">Pregunta ${numero}</span>
                            <p class="text-lg md:text-xl font-medium leading-relaxed">${pregunta}</p>
                        </div>
                    </div>
                `;

                // Agregar evento de clic para voltear la tarjeta
                card.addEventListener('click', () => {
                    card.classList.toggle('flipped');
                });

                gridContainer.appendChild(card);
            });
        }

        // Función para reiniciar todas las tarjetas (voltearlas a su lado frontal)
        resetBtn.addEventListener('click', () => {
            const tarjetas = document.querySelectorAll('.card');
            tarjetas.forEach(tarjeta => {
                tarjeta.classList.remove('flipped');
            });
        });

        // Inicializar la aplicación
        crearTarjetas();
    </script>
</body>
</html>
